schemaVersion: 2.2.0
metadata:
  name: hermes-agent
  displayName: Hermes Agent
  description: Persistent Hermes AI Agent workspace

components:
  - name: hermes-runtime
    container:
      image: registry.redhat.io/ubi9/python-311:latest
      memoryLimit: 3Gi
      memoryRequest: 1Gi
      cpuLimit: 2000m
      cpuRequest: 500m
      volumeMounts:
        - name: workspace-storage
          path: /home/user
  - name: workspace-storage
    volume:
      size: 5Gi

commands:
  - id: keepalive
    exec:
      component: hermes-runtime
      commandLine: "tmux new-session -d -s keepalive 'while true; do curl -s -o /dev/null https://console.redhat.com 2>/dev/null; sleep 120; done'"

events:
  postStart:
    - keepalive
